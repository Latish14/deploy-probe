services:
  web:
    build: .
    container_name: deploy-probe
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - APP_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
